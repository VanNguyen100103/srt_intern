# ===== Ung dung =====
spring.application.name=todo-list
server.port=8080

# ===== Database: H2 (file-based, du lieu duoc giu lai sau khi restart) =====
spring.datasource.url=jdbc:h2:file:./data/tododb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ===== H2 Console (xem database tai http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
