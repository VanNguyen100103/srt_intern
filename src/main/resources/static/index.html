<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc — Todo List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>📝 Quản lý công việc</h1>
    </header>

    <!-- Form thêm / sửa công việc -->
    <section class="card">
        <h2 id="form-title">Thêm công việc mới</h2>
        <form id="task-form" novalidate>
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label for="title">Tiêu đề <span class="required">*</span></label>
                <input type="text" id="title" maxlength="255" placeholder="Ví dụ: Hoàn thành báo cáo tuần" autocomplete="off">
                <small class="error-text" id="title-error"></small>
            </div>
            <div class="form-group">
                <label for="description">Mô tả</label>
                <textarea id="description" maxlength="2000" rows="2" placeholder="Mô tả chi tiết (không bắt buộc)"></textarea>
                <small class="error-text" id="description-error"></small>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submit-btn">Thêm công việc</button>
                <button type="button" class="btn btn-secondary hidden" id="cancel-btn">Hủy</button>
            </div>
        </form>
    </section>

    <!-- Thanh công cụ: tìm kiếm, lọc, sắp xếp -->
    <section class="card toolbar">
        <input type="search" id="search-input" placeholder="🔍 Tìm kiếm theo tiêu đề hoặc mô tả...">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="pending">Đang làm</button>
            <button class="filter-btn" data-filter="completed">Hoàn thành</button>
        </div>
        <select id="sort-select" title="Sắp xếp">
            <option value="createdAt,desc">Mới nhất trước</option>
            <option value="createdAt,asc">Cũ nhất trước</option>
            <option value="title,asc">Tiêu đề A → Z</option>
            <option value="title,desc">Tiêu đề Z → A</option>
        </select>
    </section>

    <!-- Danh sách công việc -->
    <section id="task-list" class="task-list"></section>
    <p id="empty-message" class="empty-message hidden">Chưa có công việc nào. Hãy thêm công việc đầu tiên! 🎉</p>

    <!-- Phân trang -->
    <nav class="pagination" id="pagination"></nav>

    <div id="toast" class="toast hidden"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
