# Supabase goi Free se tam dung (pause) project sau ~7 ngay khong co hoat dong.
# Workflow nay tu dong goi API moi ngay de giu project luon song.
# Yeu cau: tao secret SUPABASE_ANON_KEY trong Settings > Secrets and variables > Actions
name: Keep Supabase alive

on:
  schedule:
    - cron: '0 1 * * *'   # 8h sang gio Viet Nam, moi ngay
  workflow_dispatch:       # cho phep bam nut chay tay tren tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -sf -o /dev/null \
            "https://mtznaxaggqrghmabtpjp.supabase.co/rest/v1/tasks?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
          echo "Supabase da duoc ping thanh cong"
