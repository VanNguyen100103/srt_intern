# ===== Ung dung =====
spring.application.name=todo-list
# Render/Heroku cap cong qua bien PORT; chay local thi mac dinh 8080
server.port=${PORT:8080}

# ===== Database: PostgreSQL (Supabase) =====
# Toan bo thong tin ket noi doc tu bien moi truong — khong hardcode trong code
# SUPABASE_DB_URL      vd: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres
# SUPABASE_DB_USER     vd: postgres.<project-ref>
# SUPABASE_DB_PASSWORD mat khau database
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Supabase Free gioi han 15 ket noi qua pooler — thu nho pool de chay duoc
# nhieu instance cung luc (local + Render) ma khong cham tran
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
