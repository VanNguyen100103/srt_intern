# ===== Ung dung =====
spring.application.name=todo-list
server.port=8080

# ===== Database: PostgreSQL (Supabase) =====
# Toan bo thong tin ket noi doc tu bien moi truong — khong hardcode trong code
# SUPABASE_DB_URL      vd: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres
# SUPABASE_DB_USER     vd: postgres.<project-ref>
# SUPABASE_DB_PASSWORD mat khau database
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
